<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RalphFlow Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-surface: #161b22;
    --bg-hover: #1c2128;
    --bg-active: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --green: #3fb950;
    --blue: #58a6ff;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header .host {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    border-right: 1px solid var(--border);
    background: var(--bg-surface);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-section {
    padding: 12px 0;
  }
  .sidebar-label {
    padding: 0 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .sidebar-item {
    display: block;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-item.active {
    background: var(--bg-active);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .sidebar-item.app-item {
    font-weight: 600;
    color: var(--text);
    padding: 8px 16px;
  }
  .sidebar-item.loop-item { padding-left: 32px; font-size: 12px; }
  .sidebar-item .badge {
    font-size: 10px;
    font-family: var(--mono);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    background: var(--bg-hover);
    color: var(--text-dim);
  }
  .sidebar-progress {
    padding: 2px 16px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sidebar-progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .sidebar-progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .sidebar-progress-text {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    min-width: 28px;
    text-align: right;
  }

  /* Content */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }
  .content-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* App header */
  .app-header { margin-bottom: 24px; }
  .app-header h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .app-type-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--purple);
    background: rgba(188, 140, 255, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 8px;
  }
  .app-desc {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
  }

  /* Pipeline view */
  .pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 28px;
    padding: 16px 0;
  }
  .pipeline-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 12px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    transition: border-color 0.15s, background 0.15s;
    min-width: 120px;
  }
  .pipeline-node:hover { border-color: var(--text-dim); }
  .pipeline-node.selected { border-color: var(--accent); background: rgba(88, 166, 255, 0.05); }
  .pipeline-node .node-name { font-size: 12px; font-weight: 600; }
  .pipeline-node .node-status {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .pipeline-node .node-status.complete { background: rgba(63,185,80,0.15); color: var(--green); }
  .pipeline-node .node-status.running { background: rgba(88,166,255,0.15); color: var(--blue); }
  .pipeline-node .node-status.pending { background: rgba(139,148,158,0.1); color: var(--text-muted); }
  .pipeline-node .node-status-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pipeline-node .node-model-sep {
    color: var(--text-muted);
    font-size: 10px;
  }
  .pipeline-node .node-model {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
  }
  .pipeline-node .node-model-default {
    font-style: italic;
    opacity: 0.6;
  }
  .pipeline-node .node-progress {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
    margin-top: 2px;
  }
  .pipeline-node .node-progress-text {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
  }
  .pipeline-node .node-progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .pipeline-node .node-progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .pipeline-connector {
    width: 32px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .pipeline-connector.complete {
    background: var(--green);
  }

  /* Section */
  .section {
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* Loop detail */
  .loop-meta {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .meta-card {
    padding: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .meta-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .meta-value {
    font-family: var(--mono);
    font-size: 13px;
  }

  /* Progress bar */
  .progress-bar {
    height: 6px;
    background: var(--bg-active);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* Agent table */
  .agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--mono);
  }
  .agent-table th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
  }
  .agent-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .agent-table tr:hover td { background: var(--bg-hover); }

  /* Editor */
  .editor-wrap {
    position: relative;
  }
  .editor {
    width: 100%;
    min-height: 300px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    outline: none;
    tab-size: 2;
  }
  .editor:focus { border-color: var(--accent); }
  .editor-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    background: var(--bg-surface);
    color: var(--text);
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--text-dim); }
  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #79c0ff; }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
  }
  .btn-danger:hover { background: rgba(248, 81, 73, 0.15); }
  .btn-muted {
    background: transparent;
    color: var(--text-dim);
    border-color: var(--border);
  }
  .btn-muted:hover { background: var(--bg-hover); color: var(--text); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .dirty-indicator {
    font-size: 11px;
    color: var(--yellow);
  }
  .save-ok {
    font-size: 11px;
    color: var(--green);
  }

  /* Three-panel layout */
  .panel-grid {
    display: grid;
    grid-template-columns: 40fr 60fr;
    gap: 16px;
    min-height: 0;
  }
  .panel-col-left {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
  }
  .panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  .panel-interactive {
    flex-shrink: 0;
  }
  .panel-interactive .panel-body {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    color: var(--text-muted);
    font-size: 12px;
  }
  .panel-interactive .bell-icon {
    font-size: 14px;
    opacity: 0.5;
  }
  .panel-progress {
    flex: 1;
    min-height: 0;
  }
  .panel-edit {
    min-height: 0;
    max-height: calc(100vh - 200px);
  }
  .panel-edit .panel-body {
    display: flex;
    flex-direction: column;
  }
  .panel-edit .editor {
    flex: 1;
    min-height: 60vh;
  }

  /* Edit tabs */
  .edit-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .edit-tab {
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
  }
  .edit-tab:hover { color: var(--text); }
  .edit-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  /* Model selector */
  .model-selector-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    padding: 4px 12px;
  }
  .model-selector-wrap label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .model-selector {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
  }
  .model-selector:hover { border-color: var(--text-dim); }
  .model-selector:focus { border-color: var(--accent); }
  .model-save-ok {
    font-size: 11px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .model-save-ok.visible { opacity: 1; }

  /* Prompt mode toggle */
  .prompt-mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: fit-content;
  }
  .prompt-mode-btn {
    padding: 6px 16px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: var(--bg);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .prompt-mode-btn:not(:last-child) {
    border-right: 1px solid var(--border);
  }
  .prompt-mode-btn:hover { color: var(--text); background: var(--bg-hover); }
  .prompt-mode-btn.active {
    color: var(--text);
    background: var(--bg-active);
  }

  /* Markdown preview */
  .prompt-preview {
    flex: 1;
    min-height: 60vh;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.7;
    padding: 24px 28px;
    overflow: auto;
  }
  .prompt-preview h1 { font-size: 22px; font-weight: 600; margin: 24px 0 12px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .prompt-preview h1:first-child { margin-top: 0; }
  .prompt-preview h2 { font-size: 18px; font-weight: 600; margin: 20px 0 10px; color: var(--text); }
  .prompt-preview h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; color: var(--text); }
  .prompt-preview h4 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .prompt-preview p { margin: 0 0 12px; }
  .prompt-preview ul, .prompt-preview ol { margin: 0 0 12px; padding-left: 24px; }
  .prompt-preview li { margin: 4px 0; }
  .prompt-preview li.task-done { color: var(--text-dim); text-decoration: line-through; }
  .prompt-preview code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
  }
  .prompt-preview pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 0 0 12px;
    overflow-x: auto;
  }
  .prompt-preview pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .prompt-preview blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 16px;
    margin: 0 0 12px;
    color: var(--text-dim);
    background: var(--bg);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .prompt-preview hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }
  .prompt-preview strong { font-weight: 600; color: var(--text); }
  .prompt-preview em { font-style: italic; }
  .prompt-preview table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 12px;
    font-size: 13px;
  }
  .prompt-preview th, .prompt-preview td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .prompt-preview th {
    background: var(--bg);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-dim);
  }
  .prompt-preview a { color: var(--accent); text-decoration: none; }
  .prompt-preview a:hover { text-decoration: underline; }

  /* Read-only code viewer */
  .code-viewer {
    width: 100%;
    flex: 1;
    min-height: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    overflow: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin: 0;
  }

  /* Tracker viewer */
  .tracker-viewer {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .panel-progress .tracker-viewer {
    border: none;
    border-radius: 0;
    max-height: none;
    padding: 0;
    margin-top: 16px;
  }
  .tracker-viewer h1, .tracker-viewer h2, .tracker-viewer h3 {
    font-family: var(--sans);
    margin: 12px 0 6px;
  }
  .tracker-viewer h1 { font-size: 16px; }
  .tracker-viewer h2 { font-size: 14px; }
  .tracker-viewer h3 { font-size: 13px; }
  .tracker-viewer .cb-done { color: var(--green); }
  .tracker-viewer .cb-todo { color: var(--text-muted); }
  .tracker-viewer table {
    border-collapse: collapse;
    margin: 8px 0;
    width: 100%;
  }
  .tracker-viewer th, .tracker-viewer td {
    border: 1px solid var(--border);
    padding: 4px 10px;
    text-align: left;
    font-size: 12px;
  }
  .tracker-viewer th { background: var(--bg-active); color: var(--text-dim); }

  /* Status bar */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-surface);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }
  .status-dot.connecting { background: var(--yellow); }

  /* New App button */
  .new-app-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: calc(100% - 24px);
    margin: 8px 12px 4px;
    padding: 6px 12px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .new-app-btn:hover {
    background: var(--bg-hover);
    color: var(--text);
    border-color: var(--text-dim);
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h3 {
    font-size: 14px;
    font-weight: 600;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body {
    padding: 20px;
  }

  /* Form elements */
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .form-select, .form-input {
    width: 100%;
    padding: 8px 12px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    outline: none;
  }
  .form-select:focus, .form-input:focus {
    border-color: var(--accent);
  }
  .form-select option {
    background: var(--bg);

<script>
(function() {
  // State

  let editingTemplateName = null;

  // DOM refs
  const $ = (sel) => document.querySelector(sel);
  const hostDisplay = $('#hostDisplay');
  const sidebarApps = $('#sidebarApps');
  const content = $('#content');
  const statusDot = $('#statusDot');
  const statusText = $('#statusText');
  const lastUpdate = $('#lastUpdate');
  const eventCountEl = $('#eventCount');

  hostDisplay.textContent = location.host;

  // Fetch project context for header display
  fetch('/api/context')
    .then(r => r.json())
    .then(ctx => {
      hostDisplay.textContent = ctx.projectName + ' :' + ctx.port;
    })
    .catch(() => { /* keep location.host as fallback */ });

  // WebSocket
  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      statusDot.className = 'status-dot connected';
      statusText.textContent = 'Connected';
      reconnectDelay = 1000;
    };

    ws.onclose = () => {
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = 'Disconnected';
      setTimeout(connectWs, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => {
      ws.close();
    };

    ws.onmessage = (e) => {
      const event = JSON.parse(e.data);
      eventCounter++;
      eventCountEl.textContent = eventCounter;
      lastUpdate.textContent = new Date().toLocaleTimeString();
      handleWsEvent(event);
    };
  }

  function handleWsEvent(event) {
    if (event.type === 'status:full') {
      apps = event.apps;
      renderSidebar();
      if (selectedApp) {
        const updated = apps.find(a => a.appName === selectedApp.appName);
        if (updated) {
          selectedApp = updated;
          renderContent();
        }
      }
    } else if (event.type === 'tracker:updated') {
      if (selectedApp && selectedApp.appName === event.app) {
        // Update the loop status in our local state
        const loopEntry = selectedApp.loops.find(l => l.key === event.loop);
        if (loopEntry) {
          loopEntry.status = event.status;
        }
        renderContent();
        // Refresh tracker viewer if this loop is selected
        if (selectedLoop === event.loop) {
          loadTracker(event.app, event.loop);
        }
      }
    } else if (event.type === 'file:changed') {
      if (selectedApp && selectedApp.appName === event.app) {
        // Refresh status
        fetchAppStatus(event.app);
      }
    } else if (event.type === 'notification:attention') {
      const n = event.notification;
      notificationsList.unshift(n);
      renderSidebar();
      renderContent();
      maybeRequestNotifPermission();
      showBrowserNotification(n);
      playNotificationChime();
    } else if (event.type === 'notification:dismissed') {
      notificationsList = notificationsList.filter(n => n.id !== event.id);
      renderSidebar();
      renderContent();
    }
  }

  // API helpers
  async function fetchJson(url) {
    const res = await fetch(url);
    return res.json();
  }

  async function fetchApps() {
    apps = await fetchJson('/api/apps');
    renderSidebar();
    if (apps.length > 0 && !selectedApp) {
      selectApp(apps[0]);
    }
  }

  async function fetchAppStatus(appName) {
    const statuses = await fetchJson(`/api/apps/${encodeURIComponent(appName)}/status`);
    if (selectedApp && selectedApp.appName === appName) {
      statuses.forEach(s => {
        const loop = selectedApp.loops.find(l => l.key === s.key);
        if (loop) loop.status = s;
      });
      renderContent();
    }
  }

  // Sidebar
  function renderSidebar() {
    let html = '';
    for (const app of apps) {
      const appActive = selectedApp && selectedApp.appName === app.appName;
      const appProgress = calculatePipelineProgress(app.loops);
      html += `<div class="sidebar-item app-item${appActive ? ' active' : ''}" data-app="${esc(app.appName)}">
        ${esc(app.appName)}
        <span class="badge">${esc(app.appType)}</span>
      </div>`;
      html += `<div class="sidebar-progress">
        <div class="sidebar-progress-bar"><div class="sidebar-progress-fill" style="width:${appProgress.percentage}%"></div></div>
        <span class="sidebar-progress-text">${appProgress.percentage}%</span>
      </div>`;
      if (app.loops) {
        for (const loop of app.loops) {
          const loopActive = appActive && selectedLoop === loop.key;
          const loopNotifCount = notificationsList.filter(n => n.app === app.appName && n.loop === loop.key).length;
          const badgeHtml = loopNotifCount > 0 ? ` <span class="notif-badge">${loopNotifCount}</span>` : '';
          html += `<div class="sidebar-item loop-item${loopActive ? ' active' : ''}" data-app="${esc(app.appName)}" data-loop="${esc(loop.key)}">
            ${esc(loop.name)}${badgeHtml}
          </div>`;
        }
      }
    }
    sidebarApps.innerHTML = html;

    // "+ New App" button
    const newAppBtn = document.createElement('button');
    newAppBtn.className = 'new-app-btn';
    newAppBtn.innerHTML = '+ New App';
    newAppBtn.addEventListener('click', openCreateAppModal);
    sidebarApps.appendChild(newAppBtn);

    // Event delegation
    sidebarApps.querySelectorAll('.app-item').forEach(el => {
      el.addEventListener('click', () => {
        const app = apps.find(a => a.appName === el.dataset.app);
        if (app) selectApp(app);
      });
    });
    sidebarApps.querySelectorAll('.loop-item').forEach(el => {
      el.addEventListener('click', () => {
        const app = apps.find(a => a.appName === el.dataset.app);
        if (app) {
          selectApp(app);
          selectLoop(el.dataset.loop);
        }
      });
    });

    // Update Templates nav active state
    const templatesNav = document.getElementById('templatesNav');
    if (templatesNav) {
      templatesNav.classList.toggle('active', currentPage === 'templates');
    }

  function selectApp(app) {
    currentPage = 'app';
    selectedApp = app;
    selectedLoop = app.loops.length > 0 ? app.loops[0].key : null;
    promptDirty = false;
    activeEditTab = 'prompt';
    cachedPromptValue = null;
    activeAppTab = 'loops';
    archivesData = [];
    expandedArchive = null;
    archiveFilesCache = {};
    viewingArchiveFile = null;
    document.title = app.appName + ' - RalphFlow Dashboard';
    renderSidebar();
    renderContent();
    fetchAppStatus(app.appName);
  }

  function selectLoop(loopKey) {
    selectedLoop = loopKey;

    activeEditTab = 'prompt';

    renderSidebar();

        </div>

              <option value="">Default</option>
              <option value="claude-opus-4-6">claude-opus-4-6</option>
              <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
              <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001</option>
            </select>

          </div>

      html += '</div>'; // close .panel-grid

    content.innerHTML = html;

    // Bind app-level tab clicks
    content.querySelectorAll('.app-tab').forEach(tab => {
      tab.addEventListener('click', () => switchAppTab(tab.dataset.appTab));

    // Bind pipeline node clicks
    content.querySelectorAll('.pipeline-node').forEach(el => {
      el.addEventListener('click', () => selectLoop(el.dataset.loop));

    // Bind command copy buttons
    content.querySelectorAll('.commands-list .cmd-copy').forEach(btn => {
      btn.addEventListener('click', () => {
        const cmd = btn.dataset.cmd || '';
        navigator.clipboard.writeText(cmd).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = orig; }, 1500);
        });
      });

    // Bind notification dismiss buttons
    content.querySelectorAll('.notif-dismiss').forEach(btn => {
      btn.addEventListener('click', () => dismissNotification(btn.dataset.dismissId));

    // Bind edit tabs + load content
    if (currentLoop) {
      content.querySelectorAll('.edit-tab').forEach(tab => {
        tab.addEventListener('click', () => switchEditTab(tab.dataset.tab, app.appName, currentLoop.key));

      renderEditTabContent(app.appName, currentLoop.key);
      loadTracker(app.appName, currentLoop.key);
      loadModelSelector(app.appName, currentLoop.key);
    }

  function bindPromptEditor(appName, loopKey) {
    const editor = $('#promptEditor');
    if (!editor) return;

    editor.addEventListener('input', () => {
      promptDirty = editor.value !== promptOriginal;
      updateDirtyState();
    });

    editor.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        savePrompt(appName, loopKey);
      }
    });

    const saveBtn = $('#savePromptBtn');
    const resetBtn = $('#resetPromptBtn');
    if (saveBtn) saveBtn.addEventListener('click', () => savePrompt(appName, loopKey));
    if (resetBtn) resetBtn.addEventListener('click', () => {
      editor.value = promptOriginal;
      promptDirty = false;
      updateDirtyState();
    });
  }

  async function loadPrompt(appName, loopKey) {
    const editor = $('#promptEditor');
    if (!editor) return;

    try {
      const data = await fetchJson(`/api/apps/${encodeURIComponent(appName)}/loops/${encodeURIComponent(loopKey)}/prompt`);
      editor.value = data.content || '';
      promptOriginal = editor.value;
      promptDirty = false;
      updateDirtyState();
    } catch {
      editor.value = '(Error loading prompt)';
    }
    bindPromptEditor(appName, loopKey);
  }

  async function loadPromptPreview(appName, loopKey) {
    const preview = $('#promptPreview');
    if (!preview) return;
    try {
      const data = await fetchJson(`/api/apps/${encodeURIComponent(appName)}/loops/${encodeURIComponent(loopKey)}/prompt`);
      promptOriginal = data.content || '';
      preview.innerHTML = renderMarkdown(promptOriginal);
    } catch {
      preview.innerHTML = '<p style="color:var(--text-dim)">(Error loading prompt)</p>';
    }
  }

  async function savePrompt(appName, loopKey) {
    const editor = $('#promptEditor');
    if (!editor || !promptDirty) return;

    try {
      await fetch(`/api/apps/${encodeURIComponent(appName)}/loops/${encodeURIComponent(loopKey)}/prompt`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: editor.value }),
      });
      promptOriginal = editor.value;
      promptDirty = false;
      updateDirtyState();
      const saveOk = $('#saveOk');
      if (saveOk) {
        saveOk.style.display = 'inline';
        setTimeout(() => { saveOk.style.display = 'none'; }, 2000);
      }
    } catch {
      alert('Failed to save prompt');
    }
  }

  function updateDirtyState() {
    const saveBtn = $('#savePromptBtn');
    const resetBtn = $('#resetPromptBtn');
    const indicator = $('#dirtyIndicator');
    if (saveBtn) saveBtn.disabled = !promptDirty;
    if (resetBtn) resetBtn.disabled = !promptDirty;
    if (indicator) indicator.style.display = promptDirty ? 'inline' : 'none';
  }

  async function loadTracker(appName, loopKey) {
    const viewer = $('#trackerViewer');
    if (!viewer) return;

    try {
      const data = await fetchJson(`/api/apps/${encodeURIComponent(appName)}/loops/${encodeURIComponent(loopKey)}/tracker`);
      viewer.innerHTML = renderMarkdown(data.content || '(empty)');
    } catch {
      viewer.innerHTML = '(No tracker file found)';
    }
  }

  function switchEditTab(tab, appName, loopKey) {
    if (tab === activeEditTab) return;
    if (activeEditTab === 'prompt') {
      const editor = $('#promptEditor');
      if (editor) {
        cachedPromptValue = editor.value;
      }
    }
    activeEditTab = tab;
    document.querySelectorAll('.edit-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    renderEditTabContent(appName, loopKey);
  }

  function renderMarkdown(md) {
    if (!md) return '<p style="color:var(--text-dim)">(empty)</p>';
    let html = md;
    // Escape HTML
    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // Fenced code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      '<pre><code>' + code.trimEnd() + '</code></pre>'
    );
    // Tables
    html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (block) => {
      const rows = block.trim().split('\n').filter(r => r.trim());
      if (rows.length < 2) return block;
      const parseRow = r => r.split('|').slice(1, -1).map(c => c.trim());
      const headers = parseRow(rows[0]);
      // Skip separator row
      const isSep = rows[1] && /^\|[\s:|-]+\|$/.test(rows[1].trim());
      const dataRows = rows.slice(isSep ? 2 : 1);
      let t = '<table><thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>';
      for (const row of dataRows) {
        const cells = parseRow(row);
        t += '<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>';
      }
      t += '</tbody></table>';
      return t;
    });
    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    // Horizontal rules
    html = html.replace(/^---+$/gm, '<hr>');
    // Headings
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Task list items
    html = html.replace(/^- \[x\] (.+)$/gm, '<li class="task-done">&#9745; $1</li>');
    html = html.replace(/^- \[ \] (.+)$/gm, '<li>&#9744; $1</li>');
    // Unordered list items
    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    // Ordered list items
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Wrap consecutive <li> in <ul>
    html = html.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // Inline code (but not inside <pre>)
    html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Mustache/template vars — highlight them
    html = html.replace(/\{\{(\w+)\}\}/g, '<code style="color:var(--purple)">{{$1}}</code>');
    // Paragraphs: wrap remaining plain text lines
    html = html.replace(/^(?!<[a-z/])((?!$).+)$/gm, '<p>$1</p>');
    // Clean up double-wrapped
    html = html.replace(/<p><(h[1-4]|ul|ol|li|blockquote|pre|table|hr)/g, '<$1');
    html = html.replace(/<\/(h[1-4]|ul|ol|li|blockquote|pre|table)><\/p>/g, '</$1>');
    return html;
  }

  function renderEditTabContent(appName, loopKey) {
    const container = $('#editTabContent');
    if (!container) return;

    if (activeEditTab === 'prompt') {
      const isRead = promptViewMode === 'read';
      const isEdit = promptViewMode === 'edit';
      container.innerHTML = `
        <div class="prompt-mode-toggle">
          <button class="prompt-mode-btn${isRead ? ' active' : ''}" data-mode="read">Read</button>
          <button class="prompt-mode-btn${isEdit ? ' active' : ''}" data-mode="edit">Edit</button>
        </div>
        ${isEdit ? `<div class="editor-wrap">
          <textarea class="editor" id="promptEditor" placeholder="Loading..."></textarea>
          <div class="editor-actions">

  // Minimal markdown renderer
  function renderMarkdown(md) {
    let html = '';
    const lines = md.split('\n');
    let inTable = false;
    let tableHtml = '';

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      // Table detection
      if (line.match(/^\|.+\|$/)) {
        if (!inTable) {
          inTable = true;
          tableHtml = '<table>';
          // Header row
          const cells = line.split('|').filter(Boolean).map(c => c.trim());
          tableHtml += '<thead><tr>' + cells.map(c => `<th>${esc(c)}</th>`).join('') + '</tr></thead><tbody>';
          continue;
        }
        // Separator row
        if (line.match(/^\|[\s\-|]+\|$/)) continue;
        // Data row
        const cells = line.split('|').filter(Boolean).map(c => c.trim());
        tableHtml += '<tr>' + cells.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>';
        continue;
      } else if (inTable) {
        inTable = false;
        tableHtml += '</tbody></table>';
        html += tableHtml;
        tableHtml = '';
      }

      // Headers
      if (line.startsWith('### ')) { html += `<h3>${esc(line.slice(4))}</h3>`; continue; }
      if (line.startsWith('## ')) { html += `<h2>${esc(line.slice(3))}</h2>`; continue; }
      if (line.startsWith('# ')) { html += `<h1>${esc(line.slice(2))}</h1>`; continue; }

      // Checkboxes
      if (line.match(/^- \[x\]/i)) {
        html += `<div class="cb-done">${esc(line)}</div>`;
        continue;
      }
      if (line.match(/^- \[ \]/)) {
        html += `<div class="cb-todo">${esc(line)}</div>`;
        continue;
      }

      // Regular lines
      html += line.trim() === '' ? '<br>' : `<div>${esc(line)}</div>`;
    }

    if (inTable) {
      tableHtml += '</tbody></table>';
      html += tableHtml;
    }

    return html;
  }

  function calculatePipelineProgress(loops) {
    const perLoop = [];
    let aggCompleted = 0;
    let aggTotal = 0;
    for (const loop of (loops || [])) {
      const st = loop.status || {};
      const completed = st.completed || 0;
      const total = st.total || 0;
      const fraction = total > 0 ? completed / total : 0;
      perLoop.push({ key: loop.key, completed, total, fraction });
      if (total > 0) {
        aggCompleted += completed;
        aggTotal += total;
      }
    }
    const percentage = aggTotal > 0 ? Math.round(aggCompleted / aggTotal * 100) : 0;
    return { perLoop, completed: aggCompleted, total: aggTotal, percentage };
  }

  function formatModelName(model) {
    if (!model) return null;

  function getLoopStatusClass(loop) {
    if (!loop.status) return 'pending';
    const st = loop.status;
    if (st.total > 0 && st.completed === st.total) return 'complete';
    // Running if: has active agents, or has partial progress, or stage indicates activity (not idle/—)
    if (st.agents && st.agents.length > 0) return 'running';
    if (st.total > 0 && st.completed > 0 && st.completed < st.total) return 'running';
    if (st.stage && st.stage !== '—' && st.stage !== 'idle') return 'running';
    return 'pending';
  }

  // Audio notification chime (Web Audio API)
  function initAudioContext() {
    if (audioCtxInitialized) return;
    audioCtxInitialized = true;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      // Silent fail — audio is best-effort
    }
  }

  function playNotificationChime() {
    if (!audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      // First tone: E5 (659 Hz), 120ms
      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();
      osc1.type = 'sine';
      osc1.frequency.value = 659;
      gain1.gain.setValueAtTime(0.15, now);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc1.connect(gain1);
      gain1.connect(audioCtx.destination);
      osc1.start(now);
      osc1.stop(now + 0.12);
      // Second tone: A5 (880 Hz), 150ms, starts 80ms after first
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = 880;
      gain2.gain.setValueAtTime(0, now + 0.08);
      gain2.gain.linearRampToValueAtTime(0.12, now + 0.1);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now + 0.08);
      osc2.stop(now + 0.25);
    } catch (e) {
      // Silent fail
    }
  }

  // Initialize audio context on first user interaction (autoplay policy)

  function formatArchiveTimestamp(ts) {
    // Format: 2026-03-14_15-30 → Mar 14, 2026 at 15:30
    const match = ts.match(/^(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})/);
    if (!match) return ts;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [, year, month, day, hour, min] = match;
    return `${months[parseInt(month, 10) - 1]} ${parseInt(day, 10)}, ${year} at ${hour}:${min}`;
  }

      }
    };
    document.addEventListener('keydown', escHandler);

    // Focus name input
    const nameInput = overlay.querySelector('#modalName');
    setTimeout(() => nameInput.focus(), 50);

    // Submit on Enter in name input
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitCreateApp(overlay);
      }
    });

    // Create button
    const createBtn = overlay.querySelector('#modalCreateBtn');
    createBtn.addEventListener('click', () => submitCreateApp(overlay));
  }

  async function submitCreateApp(overlay) {
    const templateEl = overlay.querySelector('#modalTemplate');
    const nameEl = overlay.querySelector('#modalName');
    const msgEl = overlay.querySelector('#modalMessage');
    const createBtn = overlay.querySelector('#modalCreateBtn');

    const template = templateEl.value;
    const name = nameEl.value.trim();

    // Client-side validation
    if (!name) {
      msgEl.innerHTML = '<div class="form-error">Name is required</div>';
      nameEl.focus();
      return;
    }

    // Disable button during request
    createBtn.disabled = true;
    createBtn.textContent = 'Creating...';
    msgEl.innerHTML = '';

    try {
      const res = await fetch('/api/apps', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ template, name }),
      });
      const data = await res.json();

      if (!res.ok) {
        msgEl.innerHTML = `<div class="form-error">${esc(data.error || 'Failed to create app')}</div>`;
        createBtn.disabled = false;
        createBtn.textContent = 'Create';
        return;
      }

      // Success — show next-steps view
      showNextSteps(overlay, data);
    } catch (err) {
      msgEl.innerHTML = '<div class="form-error">Network error — could not reach server</div>';
      createBtn.disabled = false;
      createBtn.textContent = 'Create';
    }
  }

  function showNextSteps(overlay, data) {
    const body = overlay.querySelector('#modalBody');
    const footer = overlay.querySelector('#modalFooter');

    let warningHtml = '';
    if (data.warning) {
      warningHtml = `<div class="form-warning">${esc(data.warning)}</div>`;
    }

    let cmdsHtml = '';
    for (const cmd of data.commands) {
      cmdsHtml += `
        <div class="cmd-item">
          <span class="cmd-text">${esc(cmd)}</span>
          <button class="cmd-copy" data-cmd="${esc(cmd)}">Copy</button>
        </div>`;
    }

    body.innerHTML = `
      <div class="next-steps-success">&#10003; Created ${esc(data.appName)}</div>
      ${warningHtml}
      <div class="next-steps-label">Next steps — run one of these in your terminal:</div>
      ${cmdsHtml}
    `;

    footer.innerHTML = `<button class="btn btn-primary" data-action="close">Done</button>`;
    footer.querySelector('[data-action="close"]').addEventListener('click', () => overlay.remove());

    // Copy-to-clipboard buttons
    body.querySelectorAll('.cmd-copy').forEach((btn) => {
      btn.addEventListener('click', () => {
        const cmd = btn.dataset.cmd || '';
        navigator.clipboard.writeText(cmd).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = orig; }, 1500);
        });
      });
    });
  }

  function bindPromptBuilderEvents() {
    // "Use Builder" buttons — switch from textarea to builder mode
    content.querySelectorAll('[data-use-builder]').forEach(btn => {
      btn.addEventListener('click', () => {
        captureBuilderInputs();
        const idx = parseInt(btn.dataset.useBuilder);
        const loop = templateBuilderState.loops[idx];
        loop.useBuilder = true;
        // If loop has existing prompt text and no blocks, try to import as a single custom block
        if (loop.prompt && loop.prompt.trim() && loop.blocks.length === 0) {
          loop.blocks.push({ id: 'custom', label: 'Custom Section', content: loop.prompt });
        }
        renderTemplateBuilder();
      });
    });

    // "Done" buttons — compile blocks into prompt text, switch to textarea
    content.querySelectorAll('[data-builder-done]').forEach(btn => {
      btn.addEventListener('click', () => {
        capturePromptBuilderInputs();
        const idx = parseInt(btn.dataset.builderDone);
        const loop = templateBuilderState.loops[idx];
        loop.prompt = assemblePromptFromBlocks(loop.blocks);
        loop.useBuilder = false;
        renderTemplateBuilder();
      });
    });

    // "Back to textarea" buttons — switch to textarea without compiling
    content.querySelectorAll('[data-builder-back]').forEach(btn => {
      btn.addEventListener('click', () => {
        capturePromptBuilderInputs();
        const idx = parseInt(btn.dataset.builderBack);
        const loop = templateBuilderState.loops[idx];
        // Write blocks to prompt so user doesn't lose work
        loop.prompt = assemblePromptFromBlocks(loop.blocks);
        loop.useBuilder = false;
        renderTemplateBuilder();
      });
    });

    // Add block from palette
    content.querySelectorAll('[data-add-block]').forEach(el => {
      el.addEventListener('click', () => {
        capturePromptBuilderInputs();
        const blockId = el.dataset.addBlock;
        const loopIdx = parseInt(el.dataset.builderLoop);
        const blockType = PROMPT_BLOCK_TYPES.find(bt => bt.id === blockId);
        if (!blockType) return;
        const loop = templateBuilderState.loops[loopIdx];
        loop.blocks.push({
          id: blockType.id,
          label: blockType.label,
          content: blockType.skeleton
        });
        renderTemplateBuilder();
      });
    });

    // Move block up/down
    content.querySelectorAll('[data-block-move]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        capturePromptBuilderInputs();
        const loopIdx = parseInt(btn.dataset.bmLoop);
        const blockIdx = parseInt(btn.dataset.bmIdx);
        const direction = btn.dataset.blockMove;
        const blocks = templateBuilderState.loops[loopIdx].blocks;
        const targetIdx = direction === 'up' ? blockIdx - 1 : blockIdx + 1;
        if (targetIdx < 0 || targetIdx >= blocks.length) return;
        [blocks[blockIdx], blocks[targetIdx]] = [blocks[targetIdx], blocks[blockIdx]];
        renderTemplateBuilder();
      });
    });

    // Duplicate block
    content.querySelectorAll('[data-block-dup]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        capturePromptBuilderInputs();
        const loopIdx = parseInt(btn.dataset.bdLoop);
        const blockIdx = parseInt(btn.dataset.bdIdx);
        const blocks = templateBuilderState.loops[loopIdx].blocks;
        const clone = { ...blocks[blockIdx] };
        blocks.splice(blockIdx + 1, 0, clone);
        renderTemplateBuilder();
      });
    });

    // Remove block
    content.querySelectorAll('[data-block-remove]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        capturePromptBuilderInputs();
        const loopIdx = parseInt(btn.dataset.brLoop);
        const blockIdx = parseInt(btn.dataset.brIdx);
        templateBuilderState.loops[loopIdx].blocks.splice(blockIdx, 1);
        renderTemplateBuilder();
      });
    });

    // Block content editing — update preview live
    content.querySelectorAll('[data-block-content]').forEach(textarea => {
      textarea.addEventListener('input', () => {
        const loopIdx = parseInt(textarea.dataset.bcLoop);
        const blockIdx = parseInt(textarea.dataset.bcIdx);
        templateBuilderState.loops[loopIdx].blocks[blockIdx].content = textarea.value;
        // Update preview
        const preview = document.getElementById(`builderPreview-${loopIdx}`);
        if (preview) {
          preview.textContent = assemblePromptFromBlocks(templateBuilderState.loops[loopIdx].blocks);
        }
      });
    });

    // Drag and drop reordering for blocks
    content.querySelectorAll('.builder-block[draggable]').forEach(block => {
      block.addEventListener('dragstart', (e) => {
        block.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', `${block.dataset.blockLoop}:${block.dataset.blockIdx}`);
      });
      block.addEventListener('dragend', () => {
        block.classList.remove('dragging');
        content.querySelectorAll('.builder-block.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      block.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        block.classList.add('drag-over');
      });
      block.addEventListener('dragleave', () => {
        block.classList.remove('drag-over');
      });
      block.addEventListener('drop', (e) => {
        e.preventDefault();
        block.classList.remove('drag-over');
        const [srcLoop, srcIdx] = e.dataTransfer.getData('text/plain').split(':').map(Number);
        const destLoop = parseInt(block.dataset.blockLoop);
        const destIdx = parseInt(block.dataset.blockIdx);
        if (srcLoop !== destLoop || srcIdx === destIdx) return;
        capturePromptBuilderInputs();
        const blocks = templateBuilderState.loops[srcLoop].blocks;
        const [moved] = blocks.splice(srcIdx, 1);
        blocks.splice(destIdx, 0, moved);
        renderTemplateBuilder();
      });
    });
  }

  // Capture prompt builder block textarea values before re-render
  function capturePromptBuilderInputs() {
    if (!templateBuilderState) return;
    content.querySelectorAll('[data-block-content]').forEach(textarea => {
      const loopIdx = parseInt(textarea.dataset.bcLoop);
      const blockIdx = parseInt(textarea.dataset.bcIdx);
      const loop = templateBuilderState.loops[loopIdx];
      if (loop && loop.blocks[blockIdx]) {
        loop.blocks[blockIdx].content = textarea.value;
      }
    });
  }

  function bindTemplateBuilderEvents() {
    const backBtn = document.getElementById('builderBackBtn');
    if (backBtn) backBtn.addEventListener('click', () => {
      showTemplateBuilder = false;
      templateBuilderState = null;
      editingTemplateName = null;
      renderTemplatesPage();
    });

    const cancelBtn = document.getElementById('builderCancelBtn');
    if (cancelBtn) cancelBtn.addEventListener('click', () => {
      showTemplateBuilder = false;
      templateBuilderState = null;
      editingTemplateName = null;
      renderTemplatesPage();
    });

    const saveBtn = document.getElementById('builderSaveBtn');
    if (saveBtn) saveBtn.addEventListener('click', saveTemplate);

    const addLoopBtn = document.getElementById('addLoopBtn');
    if (addLoopBtn) addLoopBtn.addEventListener('click', () => {
      captureBuilderInputs();
      templateBuilderState.loops.push(createEmptyLoop());
      renderTemplateBuilder();
    });

    // Template name/desc inputs
    const tplName = document.getElementById('tplName');
    const tplDesc = document.getElementById('tplDesc');
    if (tplName) tplName.addEventListener('input', () => {
      templateBuilderState.name = tplName.value;
      updateYamlPreview();
    });
    if (tplDesc) tplDesc.addEventListener('input', () => {
      templateBuilderState.description = tplDesc.value;
      updateYamlPreview();
    });

    // Loop text inputs
    content.querySelectorAll('.loop-input').forEach(input => {
      const idx = parseInt(input.dataset.loopIdx);
      const field = input.dataset.field;
      const evtType = input.tagName === 'SELECT' ? 'change' : 'input';

      if (field === 'multi_agent') {
        input.addEventListener('change', () => {
          captureBuilderInputs();
          templateBuilderState.loops[idx].multi_agent = input.checked;
          renderTemplateBuilder();
        });
        return;
      }

      input.addEventListener(evtType, () => {
        const loop = templateBuilderState.loops[idx];
        if (!loop) return;
        if (field === 'max_agents') {
          loop.max_agents = parseInt(input.value) || 3;
        } else if (field === 'data_files') {
          loop.data_files = input.value.split(',').map(s => s.trim()).filter(Boolean);
        } else if (field === 'entities') {
          loop.entities = input.value.split(',').map(s => s.trim()).filter(Boolean);
        } else {
          loop[field] = input.value;
        }
        // Live-update minimap label when loop name changes
        if (field === 'name') {
          const minimapNode = content.querySelector(`.builder-minimap-node[data-minimap-idx="${idx}"] .minimap-label`);
          if (minimapNode) minimapNode.textContent = input.value || `Loop ${idx + 1}`;
        }
        updateYamlPreview();
      });
    });

    // Stage tag inputs
    content.querySelectorAll('[data-stage-input]').forEach(input => {
      const idx = parseInt(input.dataset.stageInput);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const value = input.value.trim().replace(/,/g, '');
          if (value && !templateBuilderState.loops[idx].stages.includes(value)) {
            captureBuilderInputs();
            templateBuilderState.loops[idx].stages.push(value);
            renderTemplateBuilder();
            setTimeout(() => {
              const newInput = content.querySelector(`[data-stage-input="${idx}"]`);
              if (newInput) newInput.focus();
            }, 0);
          }
        }
      });
    });

    // Stage tag remove buttons
    content.querySelectorAll('.stage-tag-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        captureBuilderInputs();
        const loopIdx = parseInt(btn.dataset.loopIdx);
        const stageIdx = parseInt(btn.dataset.stageIdx);
        templateBuilderState.loops[loopIdx].stages.splice(stageIdx, 1);
        renderTemplateBuilder();
      });
    });

    // Remove loop buttons
    content.querySelectorAll('[data-remove-loop]').forEach(btn => {
      btn.addEventListener('click', () => {
        captureBuilderInputs();
        const idx = parseInt(btn.dataset.removeLoop);
        templateBuilderState.loops.splice(idx, 1);
        renderTemplateBuilder();
      });
    });

    // Optional fields toggle
    content.querySelectorAll('[data-toggle-optional]').forEach(btn => {
      btn.addEventListener('click', () => {
        captureBuilderInputs();
        const idx = parseInt(btn.dataset.toggleOptional);
        templateBuilderState.loops[idx].showOptional = !templateBuilderState.loops[idx].showOptional;
        renderTemplateBuilder();
      });
    });

    // Prompt section toggle
    content.querySelectorAll('[data-toggle-prompt]').forEach(btn => {
      btn.addEventListener('click', () => {
        captureBuilderInputs();
        const idx = parseInt(btn.dataset.togglePrompt);
        templateBuilderState.loops[idx].showPrompt = !templateBuilderState.loops[idx].showPrompt;
        renderTemplateBuilder();
      });
    });

    // Prompt textarea input
    content.querySelectorAll('.prompt-textarea').forEach(textarea => {
      textarea.addEventListener('input', () => {
        const idx = parseInt(textarea.dataset.promptIdx);
        templateBuilderState.loops[idx].prompt = textarea.value;
      });
    });

    // Minimap: click node → scroll to loop card + highlight
    content.querySelectorAll('.builder-minimap-node').forEach(node => {
      node.addEventListener('click', () => {
        const idx = parseInt(node.dataset.minimapIdx);
        const card = content.querySelector(`.loop-card[data-loop-index="${idx}"]`);
        if (!card) return;
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // Highlight the card briefly
        content.querySelectorAll('.loop-card.highlighted').forEach(c => c.classList.remove('highlighted'));
        card.classList.add('highlighted');
        setTimeout(() => card.classList.remove('highlighted'), 1500);
        // Update active minimap node
        content.querySelectorAll('.builder-minimap-node.active').forEach(n => n.classList.remove('active'));
        node.classList.add('active');
      });
    });

    // Minimap: add button
    const minimapAddBtn = document.getElementById('minimapAddBtn');
    if (minimapAddBtn) {
      minimapAddBtn.addEventListener('click', () => {
        captureBuilderInputs();
        templateBuilderState.loops.push(createEmptyLoop());
        renderTemplateBuilder();
        // Scroll to the new card after render
        setTimeout(() => {
          const cards = content.querySelectorAll('.loop-card');
          const last = cards[cards.length - 1];
          if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      });
    }

    // Minimap: bidirectional sync — scroll highlights minimap node
    setupMinimapScrollSync();

    // Prompt builder events
    bindPromptBuilderEvents();
  }

  let minimapObserver = null;

  function setupMinimapScrollSync() {
    // Clean up previous observer
    if (minimapObserver) { minimapObserver.disconnect(); minimapObserver = null; }

    const cards = content.querySelectorAll('.loop-card[data-loop-index]');
    if (cards.length === 0) return;

    // Use the content area as the scroll root
    const scrollRoot = content;

    minimapObserver = new IntersectionObserver((entries) => {
      // Find the most visible card
      let bestEntry = null;
      let bestRatio = 0;
      for (const entry of entries) {
        if (entry.isIntersecting && entry.intersectionRatio > bestRatio) {
          bestRatio = entry.intersectionRatio;
          bestEntry = entry;
        }
      }
      if (bestEntry) {
        const idx = bestEntry.target.dataset.loopIndex;
        const minimapNodes = content.querySelectorAll('.builder-minimap-node');
        minimapNodes.forEach(n => {
          n.classList.toggle('active', n.dataset.minimapIdx === idx);
        });
      }
    }, {
      root: scrollRoot,
      threshold: [0, 0.25, 0.5, 0.75, 1.0]
    });

    cards.forEach(card => minimapObserver.observe(card));
  }

  // Capture current input values into state before re-render
  function captureBuilderInputs() {
    const state = templateBuilderState;
    if (!state) return;
    const tplName = document.getElementById('tplName');

      } else if (field === 'data_files') {

      } else if (field === 'entities') {
        loop.entities = input.value.split(',').map(s => s.trim()).filter(Boolean);

  function updateYamlPreview() {
    const preview = document.getElementById('yamlPreview');
    if (preview && templateBuilderState) {
      preview.textContent = generateYamlPreview(templateBuilderState);
    }
  }

  function generateYamlPreview(state) {
    let yaml = '';
    yaml += `name: ${state.name || 'my-template'}\n`;
    yaml += `description: "${state.description || ''}"\n`;
    yaml += `version: 1\n`;
    yaml += `dir: .ralph-flow\n`;
    yaml += `entities: {}\n`;
    yaml += `loops:\n`;

    state.loops.forEach((loop, index) => {
      const baseName = (loop.name || `loop-${index + 1}`).toLowerCase().replace(/\s+/g, '-');
      const loopKey = baseName.endsWith('-loop') ? baseName : `${baseName}-loop`;
      const dirPrefix = String(index).padStart(2, '0');
      const loopDirName = `${dirPrefix}-${loopKey}`;

      yaml += `  ${loopKey}:\n`;
      yaml += `    order: ${index}\n`;
      yaml += `    name: "${loop.name || `Loop ${index + 1}`}"\n`;
      yaml += `    prompt: ${loopDirName}/prompt.md\n`;
      yaml += `    tracker: ${loopDirName}/tracker.md\n`;
      yaml += `    stages: [${loop.stages.join(', ')}]\n`;
      yaml += `    completion: "${loop.completion || 'LOOP COMPLETE'}"\n`;

      if (loop.multi_agent) {
        yaml += `    multi_agent:\n`;
        yaml += `      enabled: true\n`;
        yaml += `      max_agents: ${loop.max_agents || 3}\n`;
        yaml += `      strategy: ${loop.strategy || 'parallel'}\n`;
        yaml += `      agent_placeholder: "${loop.agent_placeholder || '{{AGENT_NAME}}'}"\n`;
        yaml += `    lock:\n`;
        yaml += `      file: ${loopDirName}/.tracker-lock\n`;
        yaml += `      type: echo\n`;
        yaml += `      stale_seconds: 60\n`;
        yaml += `    worktree:\n`;
        yaml += `      strategy: shared\n`;
        yaml += `      auto_merge: true\n`;
      } else {
        yaml += `    multi_agent: false\n`;
      }

      yaml += `    model: ${loop.model || 'claude-sonnet-4-6'}\n`;
      yaml += `    cadence: 0\n`;

      if (loop.data_files && loop.data_files.length > 0) {
        yaml += `    data_files:\n`;
        loop.data_files.forEach(f => { yaml += `      - ${loopDirName}/${f}\n`; });
      }
      if (loop.entities && loop.entities.length > 0) {
        yaml += `    entities: [${loop.entities.join(', ')}]\n`;
      }
    });

    return yaml;
  }

  async function saveTemplate() {
    captureBuilderInputs();
    const state = templateBuilderState;

    if (!state.name || !state.name.trim()) {
      alert('Template name is required');
      return;
    }

    for (let i = 0; i < state.loops.length; i++) {
      const loop = state.loops[i];
      if (!loop.name || !loop.name.trim()) {
        alert(`Loop ${i + 1}: name is required`);
        return;
      }
      if (loop.stages.length === 0) {
        alert(`Loop "${loop.name}": at least one stage is required`);
        return;
      }
      if (!loop.completion || !loop.completion.trim()) {
        alert(`Loop "${loop.name}": completion string is required`);
        return;
      }
    }

    // Assemble blocks into prompt for any loops still in builder mode
    state.loops.forEach(loop => {
      if (loop.useBuilder && loop.blocks.length > 0) {
        loop.prompt = assemblePromptFromBlocks(loop.blocks);
      }
    });

    const definition = {
      name: state.name.trim(),
      description: state.description.trim(),
      loops: state.loops.map(loop => {
        const loopDef = {
          name: loop.name.trim(),
          stages: loop.stages,
          completion: loop.completion.trim(),
          model: loop.model || undefined,
        };
        if (loop.multi_agent) {
          loopDef.multi_agent = {
            enabled: true,
            max_agents: loop.max_agents || 3,
            strategy: loop.strategy || 'parallel',
            agent_placeholder: loop.agent_placeholder || '{{AGENT_NAME}}'
          };
        }
        if (loop.data_files && loop.data_files.length > 0) {
          loopDef.data_files = loop.data_files;
        }
        if (loop.entities && loop.entities.length > 0) {
          loopDef.entities = loop.entities;
        }
        if (loop.prompt && loop.prompt.trim()) {
          loopDef.prompt = loop.prompt;
        }
        return loopDef;
      })
    };

    const saveBtn = document.getElementById('builderSaveBtn');
    const saveBtnLabel = editingTemplateName ? 'Update Template' : 'Save Template';
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
    }

    try {
      // In edit mode, delete the old template first
      if (editingTemplateName) {
        const delRes = await fetch('/api/templates/' + encodeURIComponent(editingTemplateName), { method: 'DELETE' });
        if (!delRes.ok) {
          const delData = await delRes.json();
          alert(delData.error || 'Failed to update template');
          if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = saveBtnLabel; }
          return;
        }
      }

      const res = await fetch('/api/templates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(definition)
      });
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Failed to save template');
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = saveBtnLabel; }
        return;
      }

      showTemplateBuilder = false;
      templateBuilderState = null;
      editingTemplateName = null;
      templatesList = [];
      renderTemplatesPage();
    } catch {
      alert('Network error — could not reach server');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = saveBtnLabel; }
    }
  }

  async function loadTemplateForEdit(templateName) {
    try {
      const configRes = await fetch('/api/templates/' + encodeURIComponent(templateName) + '/config');
      if (!configRes.ok) {
        alert('Failed to load template config');
        return;
      }
      const config = await configRes.json();

      // Convert config loops to builder state
      const sortedLoops = Object.entries(config.loops)
        .sort(([, a], [, b]) => a.order - b.order);

      const loops = [];
      for (const [loopKey, loop] of sortedLoops) {
        const isMultiAgent = loop.multi_agent && typeof loop.multi_agent === 'object' && loop.multi_agent.enabled;
        // Strip directory prefix from data_files (e.g. "00-story-loop/stories.md" → "stories.md")
        const dataFiles = (loop.data_files || []).map(f => f.includes('/') ? f.split('/').pop() : f);

        const loopState = {
          name: loop.name || '',
          model: loop.model || 'claude-sonnet-4-6',
          stages: loop.stages || [],
          completion: loop.completion || '',
          multi_agent: !!isMultiAgent,
          max_agents: isMultiAgent ? loop.multi_agent.max_agents : 3,
          strategy: isMultiAgent ? loop.multi_agent.strategy : 'parallel',
          agent_placeholder: isMultiAgent ? loop.multi_agent.agent_placeholder : '{{AGENT_NAME}}',
          data_files: dataFiles,
          entities: loop.entities || [],
          showOptional: dataFiles.length > 0 || (loop.entities && loop.entities.length > 0),
          showPrompt: false,
          prompt: ''
        };

        // Load prompt content
        try {
          const promptRes = await fetch('/api/templates/' + encodeURIComponent(templateName) + '/loops/' + encodeURIComponent(loopKey) + '/prompt');
          if (promptRes.ok) {
            const promptData = await promptRes.json();
            loopState.prompt = promptData.content || '';
          }
        } catch { /* prompt load is best-effort */ }

        loops.push(loopState);
      }

      editingTemplateName = templateName;
      showTemplateBuilder = true;
      templateBuilderState = {
        name: config.name || templateName,
        description: config.description || '',
        loops: loops.length > 0 ? loops : [createEmptyLoop()]
      };
      renderTemplatesPage();
    } catch {
      alert('Failed to load template for editing');
    }
  }
